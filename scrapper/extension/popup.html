<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px system-ui, sans-serif; width: 320px; padding: 12px; margin: 0; background: #111; color: #f4f4f4; }
    h1 { font-size: 15px; margin: 0 0 10px; letter-spacing: 0.2px; }
    label { display: block; margin: 6px 0; }
    input[type=text], select { width: 100%; box-sizing: border-box; background: #1a1a1a; color: #f4f4f4; border: 1px solid #333; border-radius: 8px; padding: 8px; }
    button { width: 100%; padding: 9px; margin-top: 8px; cursor: pointer; border: 0; border-radius: 8px; background: #e2e2e2; color: #111; font-weight: 700; }
    button.secondary { background: #242424; color: #f4f4f4; border: 1px solid #3a3a3a; }
    #status { margin-top: 8px; min-height: 18px; color: #cfcfcf; white-space: pre-wrap; line-height: 1.4; }
    .row { display: flex; gap: 6px; }
    .row > * { flex: 1; }
    small { color: #9a9a9a; display: block; margin-top: 8px; line-height: 1.4; }
    .profile { margin: 0 0 8px; padding: 8px; border: 1px solid #2a2a2a; border-radius: 10px; background: #181818; }
    .profile strong { display: block; margin-bottom: 3px; }
  </style>
</head>
<body>
  <h1>LockIn</h1>
  <div class="profile" id="profileSummary">Loading profile...</div>
  <label>Mode
    <select id="mode">
      <option value="lookahead" selected>lookahead (3000px below fold)</option>
      <option value="strict">strict (visible only)</option>
      <option value="all">all (everything in DOM)</option>
    </select>
  </label>
  <label>Receiver
    <input id="endpoint" type="text" value="http://127.0.0.1:8765/tiles" />
  </label>
  <label>Focus topic
    <input id="topic" type="text" placeholder="e.g. python interview prep" />
  </label>
  <div class="row">
    <button id="scrape">Scrape now</button>
    <button id="watch">Watch off</button>
  </div>
  <button id="settings" class="secondary">Open settings</button>
  <div id="status"></div>
  <small>The extension now filters locally from your saved profile. The Python receiver is optional for archival.</small>
  <script src="popup.js"></script>
</body>
</html>
